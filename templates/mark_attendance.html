{% extends 'base.html' %}
{% block title %}Mark Attendance - NS Learnytics{% endblock %}
{% block content %}
<div class="card" style="margin-top: 20px;">
    <h2>Mark Attendance</h2>
    {% if error %}
    <p style="color:red; background:#fee2e2; padding:10px; border-radius:4px;">{{ error }}</p>
    {% endif %}

    <form action="" method="GET" style="margin-bottom:20px; display:flex; gap:10px; align-items:flex-end;">
        <input type="hidden" name="class_id" value="{{ class_id }}">
        <div>
            <label style="display:block; margin-bottom:5px;">Select Date</label>
            <input type="date" name="date" value="{{ date }}" required
                style="padding:8px; border:1px solid #ccc; border-radius:4px;">
        </div>
        <button type="submit" class="btn">Load Students</button>
    </form>

    {% if students %}
    <form action="{{ action_url or url_for('attendance.mark_attendance') }}" method="POST">
        <input type="hidden" name="class_id" value="{{ class_id }}">
        <input type="hidden" name="date" value="{{ date }}">
        <div style="overflow-x:auto;">
            <table style="width:100%; border-collapse:collapse; margin-bottom:20px;">
                <tr style="border-bottom:2px solid #eee; text-align:left;">
                    <th style="padding:10px;">Student Name</th>
                    <th style="padding:10px;">Status</th>
                </tr>
                {% for s in students %}
                <tr style="border-bottom:1px solid #eee;">
                    <td style="padding:10px;">{{ s.name }}</td>
                    <td style="padding:10px;">
                        <label style="margin-right:15px; cursor:pointer;">
                            <input type="radio" name="status_{{ s.id }}" value="present" required checked> Present
                        </label>
                        <label style="cursor:pointer;">
                            <input type="radio" name="status_{{ s.id }}" value="absent" required> Absent
                        </label>
                    </td>
                </tr>
                {% endfor %}
            </table>
        </div>
        <button type="submit" class="btn">Save Attendance</button>
    </form>
    {% endif %}
</div>
{% endblock %}
