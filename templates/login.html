{% extends 'base.html' %}
{% block title %}Login - NS Learnytics{% endblock %}
{% block content %}
<div class="card" style="max-width: 400px; margin: 50px auto;">
    <h2 style="text-align: center; margin-top: 0;">Login</h2>
    {% if error %}
    <p style="color: red; text-align: center;">{{ error }}</p>
    {% endif %}
    <form action="{{ url_for('auth.login') }}" method="POST" style="display: flex; flex-direction: column; gap: 15px;">
        <div>
            <label for="email" style="display:block; margin-bottom: 5px;">Email</label>
            <input type="email" name="email" id="email" required
                style="width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box;">
        </div>
        <div>
            <label for="password" style="display:block; margin-bottom: 5px;">Password</label>
            <input type="password" name="password" id="password" required
                style="width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box;">
        </div>
        <button type="submit" class="btn" style="margin-top: 10px;">Login</button>
    </form>
    <p style="text-align: center; margin-top: 15px;">Don't have an account? <a
            href="{{ url_for('auth.register') }}">Register</a></p>
</div>
{% endblock %}
